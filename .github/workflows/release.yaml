name: Build Mobile App

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-nightly"

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --force

      - name: Generate Native Folders
        run: npx expo prebuild --platform android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Android Release (APK)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: mobile/android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --force

      - name: Generate Native Folders
        run: npx expo prebuild --platform ios

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS (Simulator Build)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme $(basename ios/*.xcworkspace .xcworkspace) \
                     -configuration Release \
                     -sdk iphonesimulator \
                     derivedDataPath build

      - name: Zip iOS App
        run: |
          cd build/Build/Products/Release-iphonesimulator
          zip -r ../../../../app-sim.zip *.app

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: mobile/app-sim.zip

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v7
        with:
          name: android-build
          path: ./artifacts

      - name: Download iOS Artifact
        uses: actions/download-artifact@v7
        with:
          name: ios-build
          path: ./artifacts

      - name: Check if Nightly
        id: check-nightly
        run: |
          if [[ "${{ github.ref_name }}" == *-nightly ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
          prerelease: ${{ steps.check-nightly.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
