name: Build Mobile App

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-nightly"

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Native Folders
        run: npx expo prebuild --platform android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Android Release (APK)
        run: |
          cd android
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            -PenableProguardInReleaseBuilds=true \
            -PenableShrinkResourcesInReleaseBuilds=true \
            -PonlyIncludedeDefaultMonoFont=true \
            -Dorg.gradle.jvmargs="-Xmx5g" \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.caching=true \
            -Dorg.gradle.vfs.watch=true

      - name: Rename Android Artifact
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          NEW_NAME="lbs-android-${{ github.ref_name }}.apk"
          mv "$APK_PATH" "$NEW_NAME"
          echo "APK renamed to $NEW_NAME"

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: lbs-android-${{ github.ref_name }}.apk

  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Native Folders
        run: npx expo prebuild --platform ios

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS (Simulator Build)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme $(basename ios/*.xcworkspace .xcworkspace) \
                     -configuration Release \
                     -sdk iphonesimulator \
                     -derivedDataPath build \
                     ONLY_ACTIVE_ARCH=YES \
                     DEBUG_INFORMATION_FORMAT=dwarf \
                     COMPILER_INDEX_STORE_ENABLE=NO \
                     PRC_MAX_CONCURRENT_BUILD_TASKS=3 \
                     -parallelizeTargets

      - name: Rename and Zip iOS App
        run: |
          cd build/Build/Products/Release-iphonesimulator
          ZIP_NAME="lbs-ios-${{ github.ref_name }}.zip"
          zip -r "../../../../${ZIP_NAME}" *.app
          echo "iOS artifact renamed to $ZIP_NAME"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: lbs-ios-${{ github.ref_name }}.zip

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v7
        with:
          name: android-build
          path: ./artifacts

      - name: Download iOS Artifact
        uses: actions/download-artifact@v7
        with:
          name: ios-build
          path: ./artifacts

      - name: Check if Nightly
        id: check-nightly
        run: |
          if [[ "${{ github.ref_name }}" == *-nightly ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*
          prerelease: ${{ steps.check-nightly.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
